<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <title>로켓 수급노트</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#020617;color:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{max-width:430px;margin:0 auto;min-height:100vh;padding:20px 16px 92px;background:#020617}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .sub{color:#94a3b8;font-size:14px}.title{font-size:28px;font-weight:800;margin:2px 0}
    .icon{width:46px;height:46px;border-radius:18px;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:24px}
    .summary,.card,.sector,.notice{background:#0f172a;border:1px solid #1e293b;border-radius:24px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);text-align:center;margin-bottom:14px}
    .num{font-size:22px;font-weight:800}.label{font-size:12px;color:#94a3b8;margin-top:3px}
    input{width:100%;background:#0f172a;border:1px solid #1e293b;border-radius:18px;color:white;padding:13px 14px;margin:0;outline:none}
    .tabs{display:flex;gap:8px;overflow-x:auto;margin:12px 0 14px;padding-bottom:4px}
    .tab{border:0;border-radius:999px;padding:10px 15px;background:#0f172a;color:#94a3b8;white-space:nowrap}
    .tab.active{background:white;color:#020617;font-weight:700}
    .list{display:flex;flex-direction:column;gap:14px}.row{display:flex;justify-content:space-between;gap:10px}.name{font-size:19px;font-weight:800}.code,.muted{color:#94a3b8;font-size:13px}
    .star{width:42px;height:42px;border:0;border-radius:16px;background:#1e293b;color:#94a3b8;font-size:20px}.star.on{background:rgba(234,179,8,.18);color:#fde047}
    .badges,.signals{display:flex;gap:8px;overflow-x:auto;margin:12px 0}.badge{font-size:12px;padding:7px 10px;border-radius:999px;white-space:nowrap}
    .blue{background:rgba(59,130,246,.16);color:#93c5fd}.green{background:rgba(16,185,129,.16);color:#6ee7b7}.orange{background:rgba(249,115,22,.16);color:#fdba74}
    .bar{height:8px;background:#1e293b;border-radius:99px;overflow:hidden;margin:8px 0 14px}.fill{height:100%;background:white;border-radius:99px}
    .signal{font-size:12px;background:#1e293b;color:#e2e8f0;padding:8px 10px;border-radius:999px;white-space:nowrap}
    .info{font-size:14px;color:#cbd5e1;line-height:1.8}.reason{background:#020617;border-radius:18px;padding:12px;margin:12px 0}.reason p{margin:4px 0 0;color:#cbd5e1;font-size:14px;line-height:1.55}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.box{background:#1e293b;border-radius:16px;padding:10px}.box b{display:block;font-size:12px;color:#94a3b8;margin-bottom:5px}.box span{font-size:12px}
    .bottom{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:calc(100% - 32px);max-width:430px;background:rgba(15,23,42,.96);border:1px solid #1e293b;border-radius:24px;display:flex;justify-content:space-around;padding:12px}
    .bottom button{background:none;border:0;color:#cbd5e1;font-size:12px}.refresh{border:0;border-radius:16px;background:white;color:#020617;font-weight:800;padding:11px 14px}.small{font-size:12px;color:#94a3b8}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><div><div class="sub">아이폰 수급포착 앱</div><div class="title">로켓 수급노트</div><div class="small" id="updated">데이터 불러오는 중...</div></div><div class="icon">🚀</div></div>
    <div class="summary"><div><div class="num" id="topCount">-</div><div class="label">강관심 이상</div></div><div><div class="num" id="bigTradeCount">-</div><div class="label">대량체결</div></div><div><div class="num" id="sectorCount">-</div><div class="label">주도섹터</div></div></div>
    <div style="display:flex;gap:8px"><input id="q" placeholder="종목명, 코드, 섹터 검색" /><button class="refresh" onclick="loadData()">새로고침</button></div>
    <div class="tabs" id="tabs"></div><div class="list" id="content"><div class="notice">데이터를 불러오는 중입니다.</div></div>
  </div>
  <div class="bottom"><button onclick="setTab('포착')">📡<br>포착</button><button onclick="setTab('섹터')">📊<br>섹터</button><button onclick="setTab('대량체결')">🔥<br>체결</button><button onclick="setTab('기록')">📝<br>기록</button></div>
<script>
const tabs=["포착","섹터","프로그램","대량체결","눌림반등","기록"];
let active="포착", stocks=[], sectors=[], saved=JSON.parse(localStorage.getItem("saved")||"{}");
function label(s){return s>=85?"최우선":s>=75?"강관심":s>=60?"관심":s>=45?"관찰":"제외"}
function setTab(t){active=t;render()} document.getElementById("q").addEventListener("input",render);
async function loadData(){const c=document.getElementById("content");c.innerHTML='<div class="notice">최신 데이터를 불러오는 중입니다.</div>';try{const res=await fetch("/api/stocks?ts="+Date.now());if(!res.ok)throw new Error(res.status);const data=await res.json();stocks=data.stocks||[];sectors=data.sectors||[];document.getElementById("updated").textContent=data.updatedAt?"업데이트: "+data.updatedAt:"업데이트 완료";document.getElementById("topCount").textContent=stocks.filter(s=>s.score>=75).length;document.getElementById("bigTradeCount").textContent=stocks.filter(s=>(s.bigTrade||"").includes("포착")).length;document.getElementById("sectorCount").textContent=sectors.length;render()}catch(e){c.innerHTML='<div class="notice">데이터를 불러오지 못했습니다.<br><br><span class="muted">GitHub에 api/stocks.js 파일이 있는지 확인해 주세요.</span></div>';document.getElementById("updated").textContent="데이터 연결 필요"}}
function renderTabs(){document.getElementById("tabs").innerHTML=tabs.map(t=>`<button class="tab ${active===t?'active':''}" onclick="setTab('${t}')">${t}</button>`).join("")}
function render(){renderTabs();const q=document.getElementById("q").value.trim(), c=document.getElementById("content");if(active==="섹터"){c.innerHTML=sectors.length?sectors.map((s,i)=>`<div class="sector"><div class="row"><div><div class="name">${i+1}. ${s.name}</div><div class="muted">대표 종목: ${s.leaders}</div></div><b>${s.change}</b></div><div class="row muted"><span>섹터 강도</span><span>${s.strength}점</span></div><div class="bar"><div class="fill" style="width:${s.strength}%"></div></div></div>`).join(""):'<div class="notice">섹터 데이터가 없습니다.</div>';return}let arr=stocks.filter(s=>(s.name||"").includes(q)||(s.code||"").includes(q)||(s.sector||"").includes(q));if(active==="프로그램")arr=arr.filter(s=>(s.programBuy||"").includes("순매수"));if(active==="대량체결")arr=arr.filter(s=>(s.bigTrade||"").includes("포착"));if(active==="눌림반등")arr=arr.filter(s=>(s.status||"").includes("눌림")||(s.status||"").includes("반등"));if(active==="기록")arr=arr.filter(s=>saved[s.code]);c.innerHTML=arr.length?arr.map(s=>`<div class="card"><div class="row"><div><div><span class="name">${s.name}</span> <span class="code">${s.code}</span></div><div class="muted">${s.price}원 · ${s.change} · ${s.sector}</div></div><button class="star ${saved[s.code]?'on':''}" onclick="toggle('${s.code}')">★</button></div><div class="badges"><span class="badge blue">${s.status}</span><span class="badge green">${label(s.score)}</span><span class="badge orange">${s.sectorRank}</span></div><div class="row muted"><span>수급포착 점수</span><span>${s.score}점</span></div><div class="bar"><div class="fill" style="width:${s.score}%"></div></div><div class="signals"><span class="signal">${s.programBuy}</span><span class="signal">${s.bigTrade}</span><span class="signal">${s.sectorRank}</span></div><div class="info">💰 ${s.supply}<br>📊 ${s.volume}<br>✅ ${s.chart}<br>🔥 대량체결 금액 ${s.bigTradeAmount}</div><div class="reason"><span class="muted">포착 판단</span><p>${s.reason}</p></div><div class="grid"><div class="box"><b>매수 후보</b><span>${s.buy}</span></div><div class="box"><b>손절 기준</b><span>${s.stop}</span></div><div class="box"><b>목표 구간</b><span>${s.target}</span></div></div></div>`).join(""):'<div class="notice">조건에 맞는 종목이 없습니다.</div>'}
function toggle(code){saved[code]=!saved[code];localStorage.setItem("saved",JSON.stringify(saved));render()}
loadData();
</script>
</body>
</html>
