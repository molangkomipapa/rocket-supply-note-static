<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <title>로켓 수급노트</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#020617;color:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{max-width:430px;margin:0 auto;min-height:100vh;padding:20px 16px 92px;background:#020617}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .sub{color:#94a3b8;font-size:14px}.title{font-size:28px;font-weight:800;margin:2px 0}
    .icon{width:46px;height:46px;border-radius:18px;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:24px}
    .summary,.card,.sector{background:#0f172a;border:1px solid #1e293b;border-radius:24px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);text-align:center;margin-bottom:14px}
    .num{font-size:22px;font-weight:800}.label{font-size:12px;color:#94a3b8;margin-top:3px}
    input{width:100%;background:#0f172a;border:1px solid #1e293b;border-radius:18px;color:white;padding:13px 14px;margin:4px 0 12px;outline:none}
    .tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px}
    .tab{border:0;border-radius:999px;padding:10px 15px;background:#0f172a;color:#94a3b8;white-space:nowrap}
    .tab.active{background:white;color:#020617;font-weight:700}
    .list{display:flex;flex-direction:column;gap:14px}.row{display:flex;justify-content:space-between;gap:10px}.name{font-size:19px;font-weight:800}.code,.muted{color:#94a3b8;font-size:13px}
    .star{width:42px;height:42px;border:0;border-radius:16px;background:#1e293b;color:#94a3b8;font-size:20px}.star.on{background:rgba(234,179,8,.18);color:#fde047}
    .badges,.signals{display:flex;gap:8px;overflow-x:auto;margin:12px 0}.badge{font-size:12px;padding:7px 10px;border-radius:999px;white-space:nowrap}
    .blue{background:rgba(59,130,246,.16);color:#93c5fd}.green{background:rgba(16,185,129,.16);color:#6ee7b7}.orange{background:rgba(249,115,22,.16);color:#fdba74}
    .bar{height:8px;background:#1e293b;border-radius:99px;overflow:hidden;margin:8px 0 14px}.fill{height:100%;background:white;border-radius:99px}
    .signal{font-size:12px;background:#1e293b;color:#e2e8f0;padding:8px 10px;border-radius:999px;white-space:nowrap}
    .info{font-size:14px;color:#cbd5e1;line-height:1.8}.reason{background:#020617;border-radius:18px;padding:12px;margin:12px 0}.reason p{margin:4px 0 0;color:#cbd5e1;font-size:14px;line-height:1.55}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.box{background:#1e293b;border-radius:16px;padding:10px}.box b{display:block;font-size:12px;color:#94a3b8;margin-bottom:5px}.box span{font-size:12px}
    .bottom{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:calc(100% - 32px);max-width:430px;background:rgba(15,23,42,.96);border:1px solid #1e293b;border-radius:24px;display:flex;justify-content:space-around;padding:12px}
    .bottom button{background:none;border:0;color:#cbd5e1;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><div><div class="sub">아이폰 수급포착 앱</div><div class="title">로켓 수급노트</div></div><div class="icon">🚀</div></div>
    <div class="summary"><div><div class="num">3</div><div class="label">강관심 이상</div></div><div><div class="num">3</div><div class="label">대량체결</div></div><div><div class="num">4</div><div class="label">주도섹터</div></div></div>
    <input id="q" placeholder="종목명, 코드, 섹터 검색" />
    <div class="tabs" id="tabs"></div>
    <div class="list" id="content"></div>
  </div>
  <div class="bottom"><button onclick="setTab('포착')">📡<br>포착</button><button onclick="setTab('섹터')">📊<br>섹터</button><button onclick="setTab('대량체결')">🔥<br>체결</button><button onclick="setTab('기록')">📝<br>기록</button></div>
<script>
const tabs=["포착","섹터","프로그램","대량체결","눌림반등","기록"];
const sectors=[{name:"조선",change:"+4.8%",strength:92,leaders:"삼성중공업, HD현대중공업"},{name:"방산/철도",change:"+3.9%",strength:87,leaders:"현대로템, 한화에어로스페이스"},{name:"자동차부품",change:"+2.6%",strength:79,leaders:"HL만도, 현대위아"},{name:"전력기기",change:"+2.1%",strength:72,leaders:"HD현대일렉트릭, 효성중공업"}];
const stocks=[{name:"HL만도",code:"204320",sector:"자동차부품",price:"71,200",change:"+1.86%",status:"눌림 후 반등 시도",sectorRank:"섹터 강도 4위",programBuy:"프로그램 순매수 12.4억",bigTrade:"1억 이상 매수 3회 포착",bigTradeAmount:"총 5.8억",supply:"외국인 3일 연속 순매수",volume:"거래대금 5일 평균 대비 +38%",chart:"20일선 지지 후 5일선 회복 시도",score:82,reason:"눌림 구간에서 프로그램 매수와 대량체결이 동시에 들어오며 반등 시도가 확인됩니다.",buy:"69,500~71,000",stop:"67,800 이탈",target:"76,500 / 79,000"},{name:"현대로템",code:"064350",sector:"방산/철도",price:"43,900",change:"+2.42%",status:"수급 유입 확인",sectorRank:"섹터 강도 2위",programBuy:"프로그램 순매수 21.7억",bigTrade:"1억 이상 매수 7회 포착",bigTradeAmount:"총 14.2억",supply:"기관 순매수 전환",volume:"거래량 전일 대비 +61%",chart:"박스권 상단 재도전",score:88,reason:"주도섹터 안에서 프로그램 매수와 대량체결 강도가 모두 높아 돌파 후보로 볼 수 있습니다.",buy:"42,800~43,600",stop:"41,700 이탈",target:"46,500 / 48,000"},{name:"삼성중공업",code:"010140",sector:"조선",price:"10,850",change:"+4.13%",status:"당일 주도주 후보",sectorRank:"섹터 강도 1위",programBuy:"프로그램 순매수 31.8억",bigTrade:"1억 이상 매수 11회 포착",bigTradeAmount:"총 22.5억",supply:"외국인·기관 동시 순매수",volume:"거래대금 급증",chart:"전고점 돌파 시도",score:92,reason:"주도섹터, 프로그램 매수, 대량체결, 거래대금이 동시에 붙은 당일 강세 후보입니다.",buy:"10,500~10,800",stop:"10,150 이탈",target:"11,500 / 12,000"}];
let active="포착"; let saved=JSON.parse(localStorage.getItem("saved")||"{}");
function label(s){return s>=90?"최우선":s>=80?"강관심":s>=65?"관심":s>=50?"관찰":"제외"}
function setTab(t){active=t;render();}
document.getElementById("q").addEventListener("input",render);
function renderTabs(){document.getElementById("tabs").innerHTML=tabs.map(t=>`<button class="tab ${active===t?'active':''}" onclick="setTab('${t}')">${t}</button>`).join("")}
function render(){renderTabs();const q=document.getElementById("q").value.trim();const c=document.getElementById("content");if(active==="섹터"){c.innerHTML=sectors.map((s,i)=>`<div class="sector"><div class="row"><div><div class="name">${i+1}. ${s.name}</div><div class="muted">대표 종목: ${s.leaders}</div></div><b>${s.change}</b></div><div class="row muted"><span>섹터 강도</span><span>${s.strength}점</span></div><div class="bar"><div class="fill" style="width:${s.strength}%"></div></div></div>`).join("");return}let arr=stocks.filter(s=>(s.name.includes(q)||s.code.includes(q)||s.sector.includes(q)));if(active==="프로그램")arr=arr.filter(s=>s.programBuy.includes("순매수"));if(active==="대량체결")arr=arr.filter(s=>s.bigTrade.includes("포착"));if(active==="눌림반등")arr=arr.filter(s=>s.status.includes("눌림")||s.status.includes("반등"));if(active==="기록")arr=arr.filter(s=>saved[s.code]);c.innerHTML=arr.map(s=>`<div class="card"><div class="row"><div><div><span class="name">${s.name}</span> <span class="code">${s.code}</span></div><div class="muted">${s.price}원 · ${s.change} · ${s.sector}</div></div><button class="star ${saved[s.code]?'on':''}" onclick="toggle('${s.code}')">★</button></div><div class="badges"><span class="badge blue">${s.status}</span><span class="badge green">${label(s.score)}</span><span class="badge orange">${s.sectorRank}</span></div><div class="row muted"><span>수급포착 점수</span><span>${s.score}점</span></div><div class="bar"><div class="fill" style="width:${s.score}%"></div></div><div class="signals"><span class="signal">${s.sectorRank}</span><span class="signal">${s.programBuy}</span><span class="signal">${s.bigTrade}</span></div><div class="info">💰 ${s.supply}<br>📊 ${s.volume}<br>✅ ${s.chart}<br>🔥 대량체결 금액 ${s.bigTradeAmount}</div><div class="reason"><span class="muted">포착 판단</span><p>${s.reason}</p></div><div class="grid"><div class="box"><b>매수 후보</b><span>${s.buy}</span></div><div class="box"><b>손절 기준</b><span>${s.stop}</span></div><div class="box"><b>목표 구간</b><span>${s.target}</span></div></div></div>`).join("")||`<div class="muted" style="text-align:center;padding:40px">조건에 맞는 종목이 없습니다.</div>`}
function toggle(code){saved[code]=!saved[code];localStorage.setItem("saved",JSON.stringify(saved));render()}
render();
</script>
</body>
</html>
