<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>로켓 수급노트</title>
<style>
body{margin:0;background:#020617;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;padding:22px 16px 96px}
.top{display:flex;justify-content:space-between;align-items:center;gap:14px}.sub{color:#94a3b8;font-size:14px}.title{font-size:28px;font-weight:850;letter-spacing:0}.icon{width:48px;height:48px;border-radius:18px;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:24px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#0f172a;border:1px solid #1e293b;border-radius:24px;padding:14px;margin:16px 0;text-align:center}.num{font-size:22px;font-weight:850}.label{font-size:11px;color:#94a3b8;margin-top:3px}
.panel,.card,.notice{background:#0f172a;border:1px solid #1e293b;border-radius:22px;padding:16px;margin-bottom:14px}.panelLine{color:#cbd5e1;font-size:14px;line-height:1.6}.small{font-size:12px;color:#94a3b8}
.search{display:flex;gap:8px;margin-bottom:14px}input{flex:1;background:#0f172a;border:1px solid #1e293b;border-radius:18px;color:#fff;padding:13px;font-size:15px}button{border:0;border-radius:16px;padding:10px 13px;font-weight:800}
.tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px}.tab{background:#0f172a;color:#94a3b8;white-space:nowrap}.tab.active{background:#fff;color:#020617}
.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.name{font-size:20px;font-weight:850}.code,.muted{color:#94a3b8;font-size:13px}.badge{display:inline-flex;font-size:12px;padding:7px 10px;border-radius:999px;white-space:nowrap;text-decoration:none;align-items:center}.green{background:rgba(16,185,129,.16);color:#6ee7b7}.blue{background:rgba(59,130,246,.16);color:#93c5fd}.orange{background:rgba(249,115,22,.16);color:#fdba74}.yellow{background:rgba(234,179,8,.16);color:#fde68a}.red{background:rgba(239,68,68,.16);color:#fca5a5}.gray{background:#1e293b;color:#cbd5e1}
.badges{display:flex;gap:8px;overflow-x:auto;margin:12px 0}.bar{height:8px;background:#1e293b;border-radius:99px;overflow:hidden;margin:8px 0 14px}.fill{height:100%;background:#93c5fd}.reason{background:#020617;border-radius:18px;padding:12px;margin-top:12px}.reason p{margin:5px 0 0;color:#cbd5e1;font-size:14px;line-height:1.55}
.checklist{display:grid;gap:7px;margin-top:9px}.check{display:flex;gap:8px;align-items:center;color:#cbd5e1;font-size:13px}.mark{width:18px;height:18px;border-radius:50%;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:11px;color:#94a3b8}.check.ok .mark{background:rgba(16,185,129,.16);color:#6ee7b7}.check.no{color:#64748b}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}.metric{background:#1e293b;border-radius:14px;padding:10px}.metric b{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}.metric span{font-size:13px;color:#e2e8f0}
.bottom{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:calc(100% - 32px);max-width:430px;background:rgba(15,23,42,.96);border:1px solid #1e293b;border-radius:24px;display:flex;justify-content:space-around;padding:12px}.bottom button{background:none;color:#cbd5e1;font-size:12px;padding:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="sub">시장 위치 판단 시스템</div>
      <div class="title">로켓 수급노트</div>
      <div class="small" id="updated">데이터 불러오는 중...</div>
    </div>
    <div class="icon">🚀</div>
  </div>

  <div class="summary">
    <div><div class="num" id="captureCount">-</div><div class="label">포착</div></div>
    <div><div class="num" id="dayTradeCount">-</div><div class="label">급등</div></div>
    <div><div class="num" id="supplyCount">-</div><div class="label">수급</div></div>
    <div><div class="num" id="avoidanceCount">-</div><div class="label">회피</div></div>
  </div>

  <div id="scanPanel" class="panel"></div>
  <div id="sectorPanel" class="panel"></div>

  <div class="search">
    <input id="q" placeholder="종목명 또는 코드 검색" />
    <button onclick="loadData(true)">새로고침</button>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="content"><div class="notice">데이터를 불러오는 중입니다.</div></div>
</div>

<div class="bottom">
  <button onclick="setTab('포착')">📡<br>포착</button>
  <button onclick="setTab('당일급등')">🔥<br>급등</button>
  <button onclick="setTab('외국기관수급')">💰<br>수급</button>
  <button onclick="setTab('회피')">⚠️<br>회피</button>
  <button onclick="setTab('관심')">⭐<br>관심</button>
  <button onclick="setTab('개별검색')">🔎<br>검색</button>
</div>

<script>
const tabs=["포착","당일급등","외국기관수급","회피","관심","개별검색"];
let active="포착";
let data={stocks:[],dayTradeStocks:[],supplyStocks:[],avoidanceStocks:[],scanScope:null,stats:null,summary:null,sectorBoard:[]};
let individual=null;
let watchlist=loadWatchlist();

function setTab(tab){active=tab;render()}
document.getElementById("q").addEventListener("input",render);

function loadWatchlist(){
  try{return JSON.parse(localStorage.getItem("rocketWatchlist")||"[]")}
  catch{return []}
}
function saveWatchlist(){localStorage.setItem("rocketWatchlist",JSON.stringify(watchlist))}
function allScanCards(){return [
  ...(data.stocks||[]),
  ...(data.dayTradeStocks||[]),
  ...(data.supplyStocks||[]),
  ...(data.avoidanceStocks||[])
]}
function findLatestCard(code){return allScanCards().find(card=>card.code===code)||null}
function isWatched(code){return watchlist.some(item=>item.code===code)}
function makeWatchSnapshot(card){
  return {
    ...card,
    addedAt:new Date().toISOString(),
    addedAtText:new Date().toLocaleDateString("ko-KR",{timeZone:"Asia/Seoul"}),
    watchedFrom:card.category||"개별분석"
  };
}
function toggleWatch(code){
  const existing=watchlist.find(item=>item.code===code);
  if(existing){
    watchlist=watchlist.filter(item=>item.code!==code);
  }else{
    const card=findLatestCard(code)||findIndividualCard(code);
    if(card) watchlist=[makeWatchSnapshot(card),...watchlist];
  }
  saveWatchlist();
  render();
}
function findIndividualCard(code){
  if(!individual?.categories) return null;
  return individual.categories.find(card=>card.code===code)||null;
}
function watchedCards(){
  return watchlist.map(saved=>{
    const latest=findLatestCard(saved.code);
    const card={...(latest||saved),addedAt:saved.addedAt,addedAtText:saved.addedAtText,watchedFrom:saved.watchedFrom,watched:true};
    if(!latest){
      card.status="관심 유지";
      card.reason=saved.reason||"현재 상위 후보에는 없지만 관심 목록에 보관 중";
      card.failed=[...(card.failed||[]),"현재 스캔 상위 목록 미노출"];
    }
    return card;
  });
}

function tone(card){
  const score=card.priorityScore??card.score;
  if(card.categoryCode==="avoidance") return score>=80?"red":score>=65?"orange":"yellow";
  if(score>=80) return "green";
  if(score>=65) return "blue";
  return "yellow";
}

function chartUrl(code){return `https://finance.naver.com/item/fchart.naver?code=${code}`}

function renderChecklist(items){
  return (items||[]).map(item=>`
    <div class="check ${item.ok?'ok':'no'}">
      <span class="mark">${item.ok?'✓':'·'}</span>
      <span>${item.label}${item.points?` (${item.points}점)`:""}</span>
    </div>`).join("");
}

function renderCard(card){
  return `
    <div class="card">
      <div class="row">
        <div>
          <div><span class="name">${card.name}</span> <span class="code">${card.code}</span></div>
          <div class="muted">${card.price}원 · ${card.change} · ${card.market} · ${card.sector||"섹터 확인 대기"}</div>
        </div>
        <span class="badge ${tone(card)}">${card.status}</span>
      </div>
      <div class="badges">
        <span class="badge gray">${card.category}</span>
        <span class="badge blue">${card.sector||"섹터 확인 대기"}</span>
        <span class="badge ${tone(card)}">우선 ${card.priorityScore??card.score}점</span>
        ${card.rawScore!==undefined?`<span class="badge gray">원점 ${card.rawScore}점</span>`:""}
        ${card.poolDisplay?`<span class="badge yellow">후보풀 보충</span>`:""}
        ${card.addedAtText?`<span class="badge gray">관심일 ${card.addedAtText}</span>`:""}
        ${card.watchedFrom?`<span class="badge gray">등록 ${card.watchedFrom}</span>`:""}
        <a class="badge green" href="${chartUrl(card.code)}" target="_blank" rel="noopener noreferrer">차트보기</a>
        <button class="badge ${isWatched(card.code)?"yellow":"gray"}" onclick="toggleWatch('${card.code}')">${isWatched(card.code)?"관심해제":"관심등록"}</button>
      </div>
      <div class="bar"><div class="fill" style="width:${Math.max(0,Math.min(card.priorityScore??card.score,100))}%"></div></div>
      <div class="metrics">
        <div class="metric"><b>20일 고점 대비</b><span>-${card.metrics.pullbackFromHigh20}%</span></div>
        <div class="metric"><b>${card.categoryCode==="supply"?"수급 매수":"거래량"}</b><span>${card.categoryCode==="supply"?`매수 ${card.metrics.programBuyDays5||0}일 / 강도 ${card.metrics.programBuyMomentum||0}배`:`오늘 ${card.metrics.volRelToday20}배 / 5일 ${card.metrics.volRel5_20}배`}</span></div>
        <div class="metric"><b>거래대금</b><span>${card.metrics.tradeValueEok}억</span></div>
        <div class="metric"><b>이평선</b><span>${card.metrics.ma20Position}</span></div>
        <div class="metric"><b>섹터 강도</b><span>${card.sectorStrength??0}점</span></div>
        <div class="metric"><b>수급</b><span>${card.metrics.program}</span></div>
      </div>
      <div class="reason"><span class="muted">통과 조건</span><p>${card.reason}</p></div>
      ${card.failed&&card.failed.length?`<div class="reason"><span class="muted">부족 조건</span><p>${card.failed.join(" · ")}</p></div>`:""}
      <div class="reason"><span class="muted">점수 체크</span><div class="checklist">${renderChecklist(card.checks)}</div></div>
    </div>`;
}

function filterCards(cards){
  const q=document.getElementById("q").value.trim();
  if(!q) return cards;
  return cards.filter(card=>
    (card.name||"").includes(q)||
    (card.code||"").includes(q)||
    (card.market||"").includes(q)||
    (card.sector||"").includes(q)||
    (card.status||"").includes(q)
  );
}

function currentCards(){
  if(active==="포착") return data.stocks||[];
  if(active==="당일급등") return data.dayTradeStocks||[];
  if(active==="외국기관수급") return data.supplyStocks||[];
  if(active==="회피") return data.avoidanceStocks||[];
  if(active==="관심") return watchedCards();
  return [];
}

function renderScanPanel(){
  const panel=document.getElementById("scanPanel");
  const scope=data.scanScope;
  const stats=data.stats;
  if(!scope||!stats){
    panel.innerHTML='<div class="panelLine">스캔 정보를 준비하는 중입니다.</div>';
    return;
  }
  const limits=data.displayLimits||{};
  const total=data.totalMatches||{};
  panel.innerHTML=`
    <div class="row">
      <div>
        <div class="muted">스캔 범위</div>
        <div class="name">코스피/코스닥 상위 ${scope.topPercent}%</div>
      </div>
      <span class="badge gray">${scope.marketDataName}</span>
    </div>
    <div class="panelLine">
      대상 ${scope.totalActualCount}개 · 분석 ${stats.analyzed}개 · 제외 ${stats.rejected}개
      <br>표시: 포착 ${limits.capture||15}개 / 급등 ${limits.dayTrade||10}개 / 수급 ${limits.supply||15}개 / 회피 ${limits.avoidance||15}개
      <br>후보풀: 포착 ${total.capture||0}개 · 급등 ${total.dayTrade||0}개 · 수급 ${total.supply||0}개 · 회피 ${total.avoidance||0}개
    </div>`;
}

function renderSectorBoard(){
  const panel=document.getElementById("sectorPanel");
  const sectors=data.sectorBoard||[];
  if(!sectors.length){
    panel.innerHTML='<div class="panelLine">섹터 강도를 계산하는 중입니다.</div>';
    return;
  }
  panel.innerHTML=`
    <div class="muted">오늘 강한 섹터</div>
    <div class="name">섹터 보드</div>
    <div class="panelLine">
      ${sectors.slice(0,5).map(s=>`
        <div style="margin-top:10px">
          <b>${s.sector}</b> · 강도 ${s.strength}점 · 포착 ${s.capture} / 급등 ${s.dayTrade} / 수급 ${s.supply} / 회피 ${s.avoidance}
          <br><span class="muted">${(s.topStocks||[]).map(x=>x.name).join(" · ")}</span>
        </div>`).join("")}
    </div>`;
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=tabs.map(tab=>
    `<button class="tab ${active===tab?'active':''}" onclick="setTab('${tab}')">${tab}</button>`
  ).join("");
}

function renderIndividual(){
  const q=document.getElementById("q").value.trim();
  const code=(q.match(/\d{6}/)||[""])[0];
  const manual=individual?renderIndividualResult(individual):"";
  document.getElementById("content").innerHTML=`
    <div class="notice">
      종목코드 6자리로 같은 조건식을 즉시 계산합니다.
      <br><br><button onclick="analyzeCode()">${code||"종목"} 분석</button>
    </div>
    ${manual}`;
}

function renderIndividualResult(result){
  if(!result.ok){
    return `<div class="card"><div class="name">${result.code}</div><div class="reason"><span class="muted">${result.rejectReason}</span><p>${result.rejectDetail}</p></div></div>`;
  }
  return `
    <div class="card">
      <div class="row">
        <div>
          <div><span class="name">${result.name}</span> <span class="code">${result.code}</span></div>
          <div class="muted">${result.price}원 · ${result.change} · ${result.market} · ${result.sector||"섹터 확인 대기"}</div>
        </div>
      </div>
      <div class="metrics">
        <div class="metric"><b>20일 고점 대비</b><span>-${result.metrics.pullbackFromHigh20}%</span></div>
        <div class="metric"><b>전체 거래량</b><span>오늘 ${result.metrics.volRelToday20}배 / 5일 ${result.metrics.volRel5_20}배</span></div>
      </div>
    </div>
    ${(result.categories||[]).map(renderCard).join("")}`;
}

function render(){
  renderTabs();
  renderScanPanel();
  renderSectorBoard();
  if(active==="개별검색"){
    renderIndividual();
    return;
  }
  const cards=filterCards(currentCards());
  const notice=active==="포착"&&data.capturePoolNotice
    ? `<div class="notice">${data.capturePoolNotice}</div>`
    : active==="관심"
    ? `<div class="notice">관심 종목 ${watchlist.length}개를 모아 보고 있습니다. 관심해제를 누르면 목록에서 사라집니다.</div>`
    : "";
  document.getElementById("content").innerHTML=cards.length
    ? notice+cards.map(renderCard).join("")
    : `<div class="notice">${active==="관심"?"아직 관심 종목이 없습니다. 종목 카드에서 관심등록을 눌러 모아보세요.":`${active} 조건에 맞는 종목이 없습니다.`}</div>`;
}

async function loadData(force=false){
  document.getElementById("content").innerHTML='<div class="notice">최신 데이터를 불러오는 중입니다.</div>';
  try{
    const res=await fetch(`/api/stocks?${force?"refresh=1&":""}ts=${Date.now()}`);
    const json=await res.json();
    if(!json.success) throw new Error(json.message||"데이터를 불러오지 못했습니다.");
    data=json;
    document.getElementById("captureCount").textContent=json.summary?.capture||0;
    document.getElementById("dayTradeCount").textContent=json.summary?.dayTrade||0;
    document.getElementById("supplyCount").textContent=json.summary?.supply||0;
    document.getElementById("avoidanceCount").textContent=json.summary?.avoidance||0;
    const cache=json.cache?.status==="fresh"?` · 캐시 ${json.cache.ageSeconds}초`:"";
    document.getElementById("updated").textContent=`업데이트: ${json.updatedAt||""}${cache}`;
    render();
  }catch(error){
    document.getElementById("content").innerHTML=`<div class="notice">데이터를 불러오지 못했습니다.<br><br><span class="muted">${error.message}</span></div>`;
    document.getElementById("updated").textContent="데이터 연결 필요";
  }
}

async function analyzeCode(){
  const code=(document.getElementById("q").value.trim().match(/\d{6}/)||[""])[0];
  if(!code){
    document.getElementById("content").innerHTML='<div class="notice">검색창에 종목코드 6자리를 입력해 주세요.</div>';
    return;
  }
  document.getElementById("content").innerHTML='<div class="notice">개별 종목을 분석하는 중입니다.</div>';
  try{
    const res=await fetch(`/api/stocks?analyzeCode=${code}&ts=${Date.now()}`);
    const json=await res.json();
    if(!json.success) throw new Error(json.message||"분석 실패");
    individual=json.analysis;
    render();
  }catch(error){
    document.getElementById("content").innerHTML=`<div class="notice">분석하지 못했습니다.<br><br><span class="muted">${error.message}</span></div>`;
  }
}

loadData();
</script>
</body>
</html>
